<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Timer</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Focus Timer</h1>

        <div class="duration-selector">
            <div class="presets">
                <button class="preset active" data-minutes="25">Work 25</button>
                <button class="preset" data-minutes="5">Break 5</button>
                <button class="preset" data-minutes="15">Long 15</button>
            </div>
            <label>
                <input type="number" id="duration" value="25" min="1" max="60">
                <span> minutes</span>
            </label>
        </div>

        <div id="timer">25:00</div>

        <div class="controls">
            <button id="start" onclick="startTimer()">Start</button>
            <button id="stop" onclick="stopTimer()">Pause</button>
            <button id="reset" onclick="resetTimer()">Reset</button>
        </div>

        <p id="status">Ready to focus?</p>
    </div>

    <script src="script.js"></script>
</body>

</html>
